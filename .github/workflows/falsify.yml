name: falsify CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run unittest suite
        run: python -m unittest discover tests -v

      - name: Run end-to-end smoke test
        run: bash tests/smoke_test.sh

      - name: Run calibration sample end-to-end
        run: |
          mkdir -p .falsify/calibration
          cp examples/calibration_sample/spec.yaml .falsify/calibration/spec.yaml
          python3 falsify.py lock calibration
          python3 falsify.py run calibration
          python3 falsify.py verdict calibration

      - name: Guard self-check (text mode, no violations expected)
        run: python3 falsify.py guard "brier score below 0.25 holds"

      - name: Exercise score command (smoke only; never blocks)
        continue-on-error: true
        run: python3 falsify.py score --format shields --output badge.json || true

  mcp-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install core + mcp extra
        run: pip install -e ".[mcp]"

      - name: Run MCP tests
        run: python -m unittest tests.test_mcp tests.test_mcp_server -v

  dogfood:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Re-run the three self-claims (dogfood)
        run: make dogfood

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate skill and agent frontmatter
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path
          import yaml

          paths = sorted(
              list(Path(".claude/skills").rglob("SKILL.md"))
              + list(Path(".claude/agents").glob("*.md"))
          )
          if not paths:
              print("No skill or agent files found under .claude/")
              sys.exit(1)

          failed = []
          for p in paths:
              text = p.read_text()
              if not text.startswith("---\n"):
                  failed.append((p, "missing '---' frontmatter header"))
                  continue
              end = text.find("\n---\n", 4)
              if end < 0:
                  failed.append((p, "frontmatter has no closing '---'"))
                  continue
              try:
                  fm = yaml.safe_load(text[4:end])
              except yaml.YAMLError as e:
                  failed.append((p, f"YAML parse error: {e}"))
                  continue
              if not isinstance(fm, dict):
                  failed.append((p, "frontmatter is not a mapping"))
                  continue
              for required in ("name", "description"):
                  if required not in fm:
                      failed.append((p, f"missing required key: {required!r}"))

          if failed:
              print("Skill / agent lint failed:")
              for p, reason in failed:
                  print(f"  - {p}: {reason}")
              sys.exit(1)
          print(f"OK — {len(paths)} skill/agent file(s) validated:")
          for p in paths:
              print(f"  - {p}")
          PY
