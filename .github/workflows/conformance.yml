name: PRML conformance

on:
  push:
    branches: [main]
    paths:
      - "spec/test-vectors/**"
      - "impl/**"
      - "falsify.py"
      - ".github/workflows/conformance.yml"
  pull_request:
    paths:
      - "spec/test-vectors/**"
      - "impl/**"
      - "falsify.py"
      - ".github/workflows/conformance.yml"
  schedule:
    # weekly health check; catches drift between impls
    - cron: "0 6 * * 1"

defaults:
  run:
    shell: bash

jobs:
  reference-target:
    name: Python reference target (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install pyyaml
        run: pip install -q pyyaml
      - name: Run conformance suite
        run: |
          cd spec/test-vectors/v0.1
          python3 conform.py "python3 reference-target.py"

  python-impl:
    name: Python (falsify.py)
    runs-on: ubuntu-latest
    needs: reference-target
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          pip install -q pyyaml
          # Ensure falsify is importable from repo root
          test -f falsify.py
      - name: Build a thin conform-shim around falsify.py
        run: |
          cat > /tmp/falsify-conform-shim.py <<'PY'
          """Reads JSON manifest on stdin; emits {canonical, hash} on stdout
             using falsify.py's _canonicalize internal helper."""
          import json, sys, hashlib
          sys.path.insert(0, ".")
          from falsify import _canonicalize  # type: ignore
          spec = json.loads(sys.stdin.read())
          canon = _canonicalize(spec)
          h = hashlib.sha256(canon.encode("utf-8")).hexdigest()
          sys.stdout.write(json.dumps({"canonical": canon, "hash": h}))
          PY
      - name: Run vectors against shim
        run: |
          cd spec/test-vectors/v0.1
          python3 conform.py "python3 /tmp/falsify-conform-shim.py"

  js-impl:
    name: JavaScript (Node)
    runs-on: ubuntu-latest
    needs: reference-target
    if: ${{ hashFiles('impl/js/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          cd impl/js
          npm ci || npm install
      - name: Build conform shim entrypoint
        run: |
          test -f impl/js/conform.mjs || (echo "impl/js/conform.mjs missing — JS impl must ship a stdin/stdout conform shim"; exit 0)
      - name: Run vectors
        if: ${{ hashFiles('impl/js/conform.mjs') != '' }}
        run: |
          cd spec/test-vectors/v0.1
          python3 conform.py "node ../../../impl/js/conform.mjs"

  go-impl:
    name: Go
    runs-on: ubuntu-latest
    needs: reference-target
    if: ${{ hashFiles('impl/go/go.mod') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build conform binary
        run: |
          cd impl/go
          test -d cmd/falsify-conform && go build -o /tmp/falsify-conform-go ./cmd/falsify-conform || echo "Go impl must ship cmd/falsify-conform; skipping"
      - name: Run vectors
        if: ${{ hashFiles('impl/go/cmd/falsify-conform/main.go') != '' }}
        run: |
          cd spec/test-vectors/v0.1
          python3 conform.py "/tmp/falsify-conform-go"

  rust-impl:
    name: Rust
    runs-on: ubuntu-latest
    needs: reference-target
    if: ${{ hashFiles('impl/rust/Cargo.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build
        run: |
          cd impl/rust
          cargo build --release --bin falsify-conform || echo "Rust impl must ship a falsify-conform bin; skipping"
      - name: Run vectors
        if: ${{ hashFiles('impl/rust/Cargo.toml') != '' }}
        run: |
          cd spec/test-vectors/v0.1
          BIN="../../../impl/rust/target/release/falsify-conform"
          test -x "$BIN" && python3 conform.py "$BIN" || echo "binary not built; skipping"

  cross-impl-summary:
    name: Cross-implementation summary
    runs-on: ubuntu-latest
    needs: [reference-target, python-impl]
    steps:
      - run: |
          echo "All required implementations passed the v0.1 conformance suite."
          echo "Optional impls (js/go/rust) skipped if their entrypoints are absent."
